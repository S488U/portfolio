name: Deploy Portfolio to Shared Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Check server availability
        id: server-check
        run: |
          curl --silent --fail ftp://${{ secrets.FTP_HOST }} || exit 0
        continue-on-error: true

      - name: Upload build via FTP
        if: steps.server-check.outcome == 'success'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: dist/
          server-dir: sabbu.plexaur.com/
          dangerous-clean-slate: true
